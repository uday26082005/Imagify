<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#DB2777" /> <!-- Pink 600 -->
    </linearGradient>
    <linearGradient id="sparkleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" /> <!-- Amber 300 -->
      <stop offset="100%" stop-color="#F59E0B" /> <!-- Amber 500 -->
    </linearGradient>
  </defs>
  
  <!-- Outer glowing ring with shutter effect -->
  <circle cx="256" cy="256" r="210" stroke="url(#lensGradient)" stroke-width="48" stroke-dasharray="160 60" stroke-linecap="round" />
  
  <!-- Inner lens ring -->
  <circle cx="256" cy="256" r="120" stroke="url(#lensGradient)" stroke-width="24" opacity="0.8" />
  
  <!-- Magic Sparkle in the center -->
  <path d="M256 150 C256 210 210 256 150 256 C210 256 256 302 256 362 C256 302 302 256 362 256 C302 256 256 210 256 150 Z" fill="url(#sparkleGradient)" />
</svg>
